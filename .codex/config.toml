# Dotfiles Project - Codex CLI Configuration
# プロジェクト固有の設定（~/.codex/config.toml より優先）
# project 側では実行境界だけを定義する。


# サンドボックス: workspace-write がスイートスポット
sandbox_mode = "workspace-write"

# 承認ポリシー: 非インタラクティブ実行用
# CLIから呼ばれる場合は never、対話時は on-request に切り替え
approval_policy = "on-request"

# project-local では profiles は未対応。必要な profile は user-level config に置く。

[guardrails]
# この repo では controller の直接実装を禁止し、委譲を必須化する
subagent_required = true
bootstrap_extra_commands = [
  "python3 -m py_compile packages/codex/.codex/ai-dlc/lib/aidlc/hooks.py",
  "python3 -m py_compile packages/codex/.codex/ai-dlc/lib/aidlc/cli.py",
  "python3 -m py_compile packages/codex/.codex/ai-dlc/lib/aidlc/workspace.py",
  "python3 -m unittest tests.test_aidlc",
]
bootstrap_edit_paths = [
  ".codex/config.toml",
  ".codex/rules/**",
  ".codex/plans/**",
  "docs/codex/**",
  "AGENTS.md",
  ".gitignore",
  "ai-dlc/**",
  ".agents/skills/**/SKILL.md",
  ".agents/skills/**/references/*.md",
  "packages/agents/.agents/skills/**/SKILL.md",
  "packages/agents/.agents/skills/**/references/*.md",
]
