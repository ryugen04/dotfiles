# dotfiles-managed: sango-project-v1
name: portable-project
version: "1.0"

services: {}

ports:
  strategy: fixed
  base_offset: 100
  range: [3000, 9999]

worktree:
  base_dir: .worktrees
  default_branch: main
  auto_setup: true
  # Do not include or copy .careflow into worktrees. Careflow case data is a
  # shared workspace store; each repo/worktree root should symlink .careflow to
  # that store via `install.sh codex-project <path>` or agent-careflow workspace
  # setup.
  include:
    root: []

doctor:
  checks:
    - name: Git
      command: git --version
      expect: git

runbooks:
  - title: General service failure
    keywords: ["service", "failure"]
    steps:
      - Run `sango doctor --json`.
      - Run `sango status --json`.
      - Inspect logs with `sango logs --json`.
