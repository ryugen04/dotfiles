# Codex CLI Configuration
# user-level AI-DLC standard profile

sandbox_mode = "workspace-write"
approval_policy = "on-request"
approvals_reviewer = "guardian_subagent"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

[features]
codex_hooks = true
shell_snapshot = true

[profiles.implement]
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.review]
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[profiles.fast]
model_reasoning_effort = "low"
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.autonomous]
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[guardrails]
# 一般 repo でも controller を read/delegate のみに固定したい時に使う
# project-local の .codex/config.toml でも同じ key を設定できる
subagent_required = false
bootstrap_extra_commands = [
  "./install.sh codex",
  "./install.sh agents",
  "./install.sh codex agents",
  "sango doctor",
  "sango status",
]
bootstrap_edit_paths = [
  ".codex/config.toml",
  "AGENTS.md",
  "ai-dlc/**",
]
