# Codex CLI Configuration
# user-level AI-DLC standard profile

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[features]
codex_hooks = true
shell_snapshot = true

[profiles.implement]
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.review]
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[profiles.fast]
model_reasoning_effort = "low"
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.autonomous]
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[projects."/home/glaucus03/dev/projects/dotfiles"]
trust_level = "trusted"

[projects."/home/glaucus03/dev/projects/harbor"]
trust_level = "trusted"

[projects."/home/glaucus03/dev/projects/harbor.nvim"]
trust_level = "trusted"

[projects."/home/glaucus03/dev/projects"]
trust_level = "trusted"

[guardrails]
# 一般 repo でも controller を read/delegate のみに固定したい時に使う
# project-local の .codex/config.toml でも同じ key を設定できる
subagent_required = false
bootstrap_extra_commands = [
  "./install.sh codex",
  "./install.sh agents",
  "./install.sh codex agents",
  "sango doctor",
  "sango status",
]
bootstrap_edit_paths = [
  ".codex/config.toml",
  "AGENTS.md",
  "ai-dlc/**",
  "ai-dlc/docs/**",
  "ai-dlc/plans/**",
  "ai-dlc/decisions/**",
]
