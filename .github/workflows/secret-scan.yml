name: Secret Scan

on:
  push:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden words
        env:
          FORBIDDEN_WORDS: ${{ secrets.FORBIDDEN_WORDS }}
        run: |
          if [ -z "$FORBIDDEN_WORDS" ]; then
            echo "::error::FORBIDDEN_WORDS secret is not set"
            exit 1
          fi

          # 改行区切りのキーワードリストをgrepパターンに変換
          pattern=$(echo "$FORBIDDEN_WORDS" | tr '\n' '|' | sed 's/|$//')

          echo "Scanning tracked files for forbidden words..."
          matches=$(git ls-files | xargs grep -inE "$pattern" 2>/dev/null || true)

          if [ -n "$matches" ]; then
            echo "::error::Forbidden words detected in tracked files"
            echo ""
            echo "$matches"
            exit 1
          fi

          echo "No forbidden words found."
