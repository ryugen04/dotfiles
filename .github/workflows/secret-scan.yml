name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden words and portability violations
        env:
          FORBIDDEN_WORDS: ${{ secrets.FORBIDDEN_WORDS || vars.FORBIDDEN_WORDS }}
        run: |
          scripts/check-portability.sh
